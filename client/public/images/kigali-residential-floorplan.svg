<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Single Storey Residential House Floor Plan</title>
  <desc id="desc">Architectural plan for a single-storey residential house in Kigali, Rwanda with four bedrooms, two bathrooms, living room, dining room, kitchen, front porch and rear service veranda.</desc>
  <defs>
    <style>
      .page{fill:#f8fafc}.paper{fill:#fff;stroke:#cbd5e1;stroke-width:2}.wall{fill:#1f2937}.partition{fill:#374151}.room{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.5}.wet{fill:#e0f2fe}.living{fill:#fefce8}.porch{fill:#f1f5f9}.label{font-family:Inter,Arial,sans-serif;font-weight:800;font-size:18px;fill:#0f172a}.small{font-family:Inter,Arial,sans-serif;font-weight:700;font-size:13px;fill:#475569}.tiny{font-family:Inter,Arial,sans-serif;font-weight:700;font-size:11px;fill:#64748b}.dim{stroke:#2563eb;stroke-width:1.8;fill:none}.dimtext{font-family:Inter,Arial,sans-serif;font-weight:800;font-size:13px;fill:#2563eb}.door{stroke:#64748b;stroke-width:3;fill:none}.window{stroke:#0284c7;stroke-width:5;stroke-linecap:round}.grid{stroke:#dbeafe;stroke-width:1;stroke-dasharray:5 7}.furniture{fill:#e2e8f0;stroke:#94a3b8;stroke-width:1.2}.plant{fill:#16a34a}.note{font-family:Inter,Arial,sans-serif;font-weight:700;font-size:12px;fill:#334155}
    </style>
